<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>小钱全网盘搜 · 完整版</title>
<style>
body {
    font-family: system-ui, sans-serif;
    background: #f5f7fb;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
}
h1 {
    margin-top: 40px;
    font-size: 36px;
    background: linear-gradient(90deg, #4a6cf7, #ff6b6b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.search {
    margin: 20px;
    display: flex;
    gap: 10px;
}
input, button {
    padding: 12px 20px;
    border-radius: 40px;
    border: 1px solid #ddd;
}
button {
    background: #4a6cf7;
    color: #fff;
    border: none;
}

.filter, .grid, .stats {
    width: 100%;
    max-width: 1200px;
    margin: 20px;
}

.filter {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
}
.filter button {
    padding: 8px 20px;
    border-radius: 20px;
    background: #eef2ff;
    cursor: pointer;
}
.filter button.active {
    background: #4a6cf7;
    color: #fff;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: #fff;
    padding: 20px;
    border-radius: 20px;
    transition: 0.3s;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
}
.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
}

.tag {
    background: #eef2ff;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    margin: 3px;
}

.stats {
    text-align: center;
    color: #6c757d;
}

/* 音乐 */
#musicPlayer {
    position: fixed;
    bottom: 20px;
    right: 20px;
    font-size: 26px;
    cursor: pointer;
}
</style>
</head>
<body>

<h1>小钱全网盘搜</h1>

<div class="search">
    <input id="kw" placeholder="搜索资源...">
    <button onclick="search()">搜索</button>
</div>

<div class="filter" id="filter"></div>
<div class="grid" id="grid"></div>

<div class="stats" id="stats">搜索状态显示</div>

<div id="musicPlayer" onclick="toggleMusic()">🎵</div>
<audio id="music"></audio>

<script>
// 初始化变量
let raw = []; // 所有资源数据
let currentFilter = '全部'; // 当前筛选的类型
let hotList = []; // 热门资源列表

// API 配置
const APIs = [
    'https://so.252035.xyz/api/search?kw=',
    'https://api2.example.com/search?kw='
];

// 缓存函数
function setCache(key, value) {
    localStorage.setItem(key, JSON.stringify({ t: Date.now(), v: value }));
}

function getCache(key) {
    let data = localStorage.getItem(key);
    if (!data) return null;
    data = JSON.parse(data);
    if (Date.now() - data.t > 3600000) return null; // 缓存1小时过期
    return data.v;
}

// 获取标签
function getTags(title) {
    const tags = [];
    if (/4K/i.test(title)) tags.push('4K');
    if (/1080/i.test(title)) tags.push('1080P');
    if (/完结/i.test(title)) tags.push('完结');
    if (/更新/i.test(title)) tags.push('更新中');
    return tags;
}

// 获取资源盘类型
function getDiskType(url) {
    if (url.includes('baidu')) return '百度';
    if (url.includes('aliyun')) return '阿里';
    if (url.includes('quark')) return '夸克';
    return '其他';
}

// 渲染筛选按钮
function renderFilter() {
    const types = [...new Set(raw.map(item => getDiskType(item.url)))];
    let html = '<button onclick="setFilter(\'全部\')" class="' + (currentFilter === '全部' ? 'active' : '') + '">全部</button>';
    types.forEach(type => {
        html += `<button onclick="setFilter('${type}')" class="${currentFilter === type ? 'active' : ''}">${type}</button>`;
    });
    document.getElementById('filter').innerHTML = html;
}

// 设置筛选
function setFilter(type) {
    currentFilter = type;
    render();
    renderFilter();
}

// 渲染资源卡片
function render() {
    const filtered = raw.filter(item => currentFilter === '全部' || getDiskType(item.url) === currentFilter);
    let html = '';
    filtered.forEach(item => {
        html += `
            <div class="card">
                <div>${item.note || '无标题'}</div>
                <div>${getTags(item.note || '').map(tag => `<span class="tag">${tag}</span>`).join('')}</div>
                <a href="${item.url}" target="_blank">打开</a>
            </div>
        `;
    });
    document.getElementById('grid').innerHTML = html;

    // 更新统计信息
    document.getElementById('stats').innerText = `找到 ${filtered.length} 个资源`;
}

// 搜索功能
async function search() {
    const keyword = document.getElementById('kw').value.trim();
    if (!keyword) return;

    const cache = getCache(keyword);
    if (cache) {
        raw = cache;
        renderFilter();
        render();
        return;
    }

    // 从API获取数据
    for (let api of APIs) {
        try {
            const response = await fetch(api + keyword);
            const data = await response.json();
            const items = data.data?.merged_by_type || {};
            let allItems = [];
            for (let type in items) allItems = allItems.concat(items[type]);
            if (allItems.length) {
                raw = allItems;
                setCache(keyword, allItems);
                renderFilter();
                render();
                return;
            }
        } catch (e) {
            console.error('API请求失败:', e);
        }
    }
    alert('未能找到相关资源');
}

// 实时搜索
let searchTimeout;
document.getElementById('kw').addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(search, 500);
});

// 音乐播放器
let musicIndex = 0;
const musicList = [
    'https://mpimg.cn/view.php/93e1ad1d1ff45f0cc3f3d6dedcd6ba3c.mp3',
    'https://mpimg.cn/view.php/93e1ad1d1ff45f0cc3f3d6dedcd6ba3c.mp3'
];
const musicElement = document.getElementById('music');

function toggleMusic() {
    if (musicElement.paused) {
        musicElement.src = musicList[musicIndex];
        musicElement.play();
    } else {
        musicElement.pause();
    }
}

musicElement.onended = () => {
    musicIndex = (musicIndex + 1) % musicList.length;
    musicElement.src = musicList[musicIndex];
    musicElement.play();
};

// 热门榜单功能
function renderHotList() {
    const hotHTML = hotList.map(item => `
        <div class="card">
            <div>${item.note}</div>
            <a href="${item.url}" target="_blank">打开</a>
        </div>
    `).join('');
    document.getElementById('grid').innerHTML = hotHTML;
}

// 假设获取热门榜单数据
setInterval(() => {
    hotList = raw.slice(0, 5); // 假设展示前五个
    renderHotList();
}, 10000);

</script>

</body>
</html>
