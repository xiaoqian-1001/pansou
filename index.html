以下是修复顶部布局并实现内容居中显示的 iOS 26 风格 HTML 代码。

```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>小钱全网盘搜 · iOS 26 风格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* iOS 26 风格变量 */
        :root {
            --bg-color: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.88);
            --text-primary: #1d1c1f;
            --text-secondary: #6c6c70;
            --text-tertiary: #8e8e93;
            --border-color: rgba(224, 224, 230, 0.6);
            --accent-color: #007aff;
            --accent-hover: #005fc1;
            --glass-bg: rgba(255, 255, 255, 0.72);
            --result-bg: rgba(0, 122, 255, 0.08);
            --input-bg: rgba(255, 255, 255, 0.8);
            --tag-bg: #e9e9ef;
            --password-tag: #fff0e6;
            --filter-active: #007aff;
            --filter-inactive: #e9e9ef;

            --shadow-md: 0 8px 28px rgba(0, 0, 0, 0.08), 0 0 0 0.5px rgba(0, 0, 0, 0.02);
            --blur-bg: saturate(180%) blur(20px);
        }

        body.dark {
            --bg-color: #000000;
            --card-bg: rgba(28, 28, 30, 0.88);
            --text-primary: #ffffff;
            --text-secondary: #98989e;
            --text-tertiary: #6c6c70;
            --border-color: rgba(56, 56, 62, 0.8);
            --accent-color: #0a84ff;
            --accent-hover: #409cff;
            --glass-bg: rgba(28, 28, 30, 0.78);
            --result-bg: rgba(10, 132, 255, 0.12);
            --input-bg: rgba(28, 28, 30, 0.8);
            --tag-bg: #2c2c2e;
            --password-tag: #3a2a1f;
            --filter-active: #0a84ff;
            --filter-inactive: #2c2c2e;
            --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.3), 0 0 0 0.5px rgba(255, 255, 255, 0.05);
            --shadow-md: 0 8px 28px rgba(0, 0, 0, 0.4), 0 0 0 0.5px rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: -apple-system, 'SF Pro Text', 'SF Pro Display', system-ui, 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        /* 主容器 - 居中且宽度优雅 */
        .app-container {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 20px;
            width: 100%;
        }

        /* iOS 风格顶部栏 - 完全修复，无重叠 */
        .ios-nav {
            position: relative;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: var(--blur-bg);
            -webkit-backdrop-filter: var(--blur-bg);
            border-bottom: 0.5px solid var(--border-color);
            padding: 12px 0;
        }

        .nav-inner {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .theme-toggle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--tag-bg);
            border: none;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            color: var(--text-primary);

        .theme-toggle:hover {
            transform: scale(1.02);

        /* 主内容区 - 完全居中 */
        .main-content {
            padding: 24px 0 40px;
        }

        /* 搜索头部卡片 */
        .search-header {
            background: var(--card-bg);
            backdrop-filter: var(--blur-bg);
            -webkit-backdrop-filter: var(--blur-bg);
            border-radius: 28px;
            padding: 28px 24px;
            margin-bottom: 20px;
            border: 0.5px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #007aff, #5856d6, #ff2d55);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
        }

        .sub {
            color: var(--text-secondary);
            margin-bottom: 24px;
            font-size: 0.9rem;
            font-weight: 400;
        }

        .search-box {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 14px 20px;
            font-size: 1rem;
            border: 0.5px solid var(--border-color);
            border-radius: 44px;
            background: var(--input-bg);
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s;
            font-weight: 400;
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
        }

        .search-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 44px;
            padding: 0 28px;
            font-size: 1rem;
            font-weight: 590;

            transition: 0.2s;

        .search-btn:hover {
            background: var(--accent-hover);
            transform: scale(0.97);

            font-size: 0.8rem;

            display: inline-block;

        /* 筛选栏 */
        .filter-bar {
            margin: 16px 0 24px 0;
            background: var(--card-bg);
            backdrop-filter: var(--blur-bg);
            border-radius: 48px;
            padding: 8px 16px;
            border: 0.5px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .filter-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            padding-left: 6px;
        }

        .filter-chip {
            background: var(--filter-inactive);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-primary);
            border: none;
        }

        .filter-chip.active {
            background: var(--filter-active);
            color: white;
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.25);
        }

        .filter-chip:hover:not(.active) {
            background: var(--border-color);
            transform: translateY(-1px);
        }

        .clear-filter {
            background: transparent;
            border: 0.5px solid var(--border-color);
            color: var(--text-secondary);
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .clear-filter:hover {
            background: var(--result-bg);
            color: var(--accent-color);
        }

        /* 结果网格 - 卡片列表 */
        .results-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: var(--blur-bg);
            -webkit-backdrop-filter: var(--blur-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 0.5px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: var(--shadow-sm);
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .card-content {
            padding: 18px 20px;
        }

        .resource-title {
            font-weight: 630;
            font-size: 1.1rem;
            line-height: 1.35;
            margin-bottom: 12px;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .meta-info {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }

        .badge {
            background: var(--tag-bg);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .password-badge {
            background: var(--password-tag);
            color: #c45c1a;
        }

        .note {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin: 12px 0;
            background: var(--result-bg);
            padding: 10px 14px;
            border-radius: 16px;
            word-break: break-word;
            line-height: 1.4;
        }

        .link-btn {
            display: block;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 12px 18px;
            border-radius: 44px;
            font-weight: 590;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 14px;
            transition: 0.2s;
        }

        .link-btn:hover {
            background: var(--accent-hover);
        }

        .footer-info {
            border-top: 0.5px solid var(--border-color);
            background: transparent;
            padding: 12px 20px;
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
            color: var(--text-tertiary);
        }

        .empty-state, .error-state {
            background: var(--card-bg);
            backdrop-filter: var(--blur-bg);
            border-radius: 28px;
            padding: 52px 24px;
            text-align: center;
            color: var(--text-secondary);
            border: 0.5px solid var(--border-color);
            font-size: 0.95rem;
        }

        .loading {
            text-align: center;
            padding: 52px;
            font-size: 0.95rem;
            color: var(--accent-color);
        }

        .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 2.5px solid var(--border-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar {
            width: 6px;
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
        }

        body.dark ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
        }

        @media (max-width: 560px) {
            .app-container { padding: 0 16px; }
            .nav-inner { padding: 0 16px; }
            .search-header { padding: 22px 18px; }
            h1 { font-size: 1.7rem; }
            .search-input { padding: 12px 18px; font-size: 0.95rem; }
            .search-btn { padding: 0 22px; font-size: 0.95rem; }
            .filter-chip { padding: 5px 14px; font-size: 0.75rem; }
            .card-content { padding: 16px; }
            .resource-title { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 - 完全独立，无重叠 -->
    <div class="ios-nav">
        <div class="nav-inner">
            <button class="theme-toggle" id="themeToggle" aria-label="切换深色模式">🌙</button>
        </div>
    </div>

    <!-- 主容器 - 内容居中 -->
    <div class="app-container">
        <div class="main-content">
            <div class="search-header">
                <h1>小钱全网盘搜</h1>
                <div class="sub">🚀 代理加速 · 智能缓存 · 按盘分类筛选</div>
                <div class="search-box">
                    <input type="text" id="searchInput" class="search-input" placeholder="电影、剧集、短剧、书籍、资料..." autocomplete="off" value="钢铁森林">
                    <button id="searchBtn" class="search-btn">搜索</button>
                </div>
                <div id="statsArea" class="stats">✨ 已启用加速代理 · 支持网盘筛选</div>
            </div>

            <!-- 动态筛选栏 -->
            <div id="filterBar" class="filter-bar" style="display: none;">
                <span class="filter-label">📂 网盘筛选</span>
                <div id="filterChipsContainer" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
                <button id="clearFilterBtn" class="clear-filter">清除</button>
            </div>

            <div id="resultsContainer" class="results-grid">
                <div class="empty-state">
                    🍃 iOS 26 风格 · 轻量流畅<br>
                    ✅ 百度 / 阿里 / 夸克 / 迅雷 分类筛选<br>
                    💡 试试「钢铁森林」「短剧」「蜜语纪」
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const ORIGIN_API = 'https://so.252035.xyz/api/search?kw=';
            const PROXY_API = 'https://proxy.api.030101.xyz/';
            const USE_PROXY = true;

            function buildApiUrl(keyword) {
                const encodedKw = encodeURIComponent(keyword);
                if (USE_PROXY) return PROXY_API + ORIGIN_API + encodedKw;
                return ORIGIN_API + encodedKw;
            }

            const cache = new Map();
            let currentFilterType = 'all';
            let currentRawResults = [];
            let currentKeyword = '';

            function getDiskType(url) {
                if (!url) return '📎 链接';
                const u = url.toLowerCase();
                if (u.includes('pan.baidu.com') || u.includes('baidu.com/s/')) return '📀 百度网盘';
                if (u.includes('aliyundrive.com') || u.includes('alipan.com')) return '☁️ 阿里云盘';
                if (u.includes('quark.cn') || u.includes('pan.quark.cn')) return '⚛️ 夸克网盘';
                if (u.includes('xunlei.com') || u.includes('pan.xunlei.com') || u.includes('xlsony.com')) return '⚡ 迅雷网盘';
                return '🔗 网盘链接';
            }

            function getPureDiskType(url) {
                const type = getDiskType(url);
                if (type === '📀 百度网盘') return '百度网盘';
                if (type === '☁️ 阿里云盘') return '阿里云盘';
                if (type === '⚛️ 夸克网盘') return '夸克网盘';
                if (type === '⚡ 迅雷网盘') return '迅雷网盘';
                return '其他';
            }

            function extractDiskTypesFromResults(results) {
                const typesSet = new Set();
                for (const item of results) {
                    const pure = getPureDiskType(item.url);
                    if (pure !== '其他') typesSet.add(pure);
                }
                const order = ['百度网盘', '阿里云盘', '夸克网盘', '迅雷网盘'];
                return order.filter(t => typesSet.has(t));
            }

            function renderFilterBar(typesArray) {
                const filterBar = document.getElementById('filterBar');
                const chipsContainer = document.getElementById('filterChipsContainer');
                if (!chipsContainer) return;
                if (!typesArray || typesArray.length === 0) {
                    filterBar.style.display = 'none';
                    return;
                }
                filterBar.style.display = 'flex';
                chipsContainer.innerHTML = '';
                
                const allChip = document.createElement('button');
                allChip.className = `filter-chip ${currentFilterType === 'all' ? 'active' : ''}`;
                allChip.textContent = `全部 (${currentRawResults.length})`;
                allChip.addEventListener('click', () => {
                    currentFilterType = 'all';
                    applyFilterAndRender();
                    updateFilterActiveUI();
                });
                chipsContainer.appendChild(allChip);
                
                typesArray.forEach(type => {
                    const count = currentRawResults.filter(item => getPureDiskType(item.url) === type).length;
                    const chip = document.createElement('button');
                    chip.className = `filter-chip ${currentFilterType === type ? 'active' : ''}`;
                    chip.textContent = `${type} (${count})`;
                    chip.addEventListener('click', () => {
                        currentFilterType = type;
                        applyFilterAndRender();
                        updateFilterActiveUI();
                    });
                    chipsContainer.appendChild(chip);
                });
            }

            function updateFilterActiveUI() {
                const chips = document.querySelectorAll('.filter-chip');
                chips.forEach(chip => {
                    const text = chip.textContent.split(' ')[0];
                    if (currentFilterType === 'all' && text === '全部') {
                        chip.classList.add('active');
                    } else if (currentFilterType !== 'all' && text === currentFilterType) {
                        chip.classList.add('active');
                    } else {
                        chip.classList.remove('active');
                    }
                });
            }

            function applyFilterAndRender() {
                if (!currentRawResults.length) {
                    renderEmptyOrError('empty', currentKeyword);
                    return;
                }
                let filtered = [...currentRawResults];
                if (currentFilterType !== 'all') {
                    filtered = filtered.filter(item => getPureDiskType(item.url) === currentFilterType);
                }
                if (filtered.length === 0) {
                    resultsContainer.innerHTML = `<div class="empty-state">😶 筛选“${currentFilterType}”下暂无资源<br>💡 试试清除筛选</div>`;
                    const totalOrigin = currentRawResults.length;
                    statsArea.innerText = `🔍 共 ${totalOrigin} 条 · 筛选 0 条 (${currentFilterType})`;
                    return;
                }
                renderResultsDirect(filtered);
                const totalOrigin = currentRawResults.length;
                statsArea.innerHTML = `✅ 共 ${totalOrigin} 条资源 · 展示 ${filtered.length} 条 (筛选: ${currentFilterType === 'all' ? '全部' : currentFilterType}) · 已缓存`;
            }

            function renderResultsDirect(resultsArray) {
                resultsContainer.innerHTML = '';
                for (let i = 0; i < resultsArray.length; i++) {
                    resultsContainer.insertAdjacentHTML('beforeend', renderCard(resultsArray[i]));
                }
                if (resultsArray.length > 30) {
                    const tip = document.createElement('div');
                    tip.className = 'stats';
                    tip.style.marginTop = '16px';
                    tip.style.textAlign = 'center';
                    tip.innerText = `✨ 共 ${resultsArray.length} 条结果，已全部加载`;
                    resultsContainer.appendChild(tip);
                }
            }

            function formatDate(dateStr) {
                if (!dateStr || dateStr.startsWith('0001-01-01')) return '日期未知';
                try {
                    const date = new Date(dateStr);
                    if (isNaN(date.getTime())) return dateStr.split('T')[0];
                    return `${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2,'0')}-${date.getDate().toString().padStart(2,'0')}`;
                } catch(e) { return dateStr; }
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
            }

            function renderCard(item) {
                const title = item.note || item.title || '未命名资源';
                const url = item.url || '#';
                const password = item.password || '';
                const source = item.source || '共享源';
                const datetime = item.datetime ? formatDate(item.datetime) : '时间未知';
                const noteDetail = item.note || '';
                const diskType = getDiskType(url);
                
                return `
                    <div class="card">
                        <div class="card-content">
                            <div class="resource-title">${escapeHtml(title)}</div>
                            <div class="meta-info">
                                <span class="badge">${diskType}</span>
                                <span class="badge">📅 ${datetime}</span>
                                <span class="badge">📡 ${escapeHtml(source)}</span>
                                ${password ? `<span class="badge password-badge">🔑 提取码: ${escapeHtml(password)}</span>` : ''}
                            </div>
                            ${noteDetail && noteDetail !== title ? `<div class="note">📄 ${escapeHtml(noteDetail.substring(0, 160))}${noteDetail.length > 160 ? '…' : ''}</div>` : ''}
                            <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" class="link-btn">打开资源链接 ↗</a>
                        </div>
                        <div class="footer-info">
                            <span>来源: ${escapeHtml(source)}</span>
                            ${password ? `<span>密码: ${escapeHtml(password)}</span>` : '<span>无密码</span>'}
                        </div>
                    </div>
                `;
            }

            function showLoading() {
                resultsContainer.innerHTML = `<div class="loading"><div class="spinner"></div><div style="margin-top:12px;">正在加速搜索...</div></div>`;
                document.getElementById('filterBar').style.display = 'none';
            }

            function showError(msg) {
                resultsContainer.innerHTML = `<div class="error-state">⚠️ ${escapeHtml(msg)}<br><br>🔄 请重试或稍后再试</div>`;
                statsArea.innerText = `❌ 请求失败`;
                document.getElementById('filterBar').style.display = 'none';
                currentRawResults = [];
                currentFilterType = 'all';
            }

            function renderEmptyOrError(state, kw) {
                if (state === 'empty') {
                    resultsContainer.innerHTML = `<div class="empty-state">🔍 未找到 “${escapeHtml(kw)}” 的相关资源<br>试试「钢铁森林」「短剧」等关键词</div>`;
                    statsArea.innerText = `无结果: ${kw}`;
                }
                document.getElementById('filterBar').style.display = 'none';
            }

            async function fetchWithTimeout(url, timeout = 9000, retries = 1) {
                for (let i = 0; i <= retries; i++) {
                    try {
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), timeout);
                        const res = await fetch(url, { signal: controller.signal, headers: { 'Accept': 'application/json' } });
                        clearTimeout(timeoutId);
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        return await res.json();
                    } catch (err) {
                        if (i === retries) throw err;
                        await new Promise(r => setTimeout(r, 500));
                    }
                }
            }

            async function searchResources(keyword) {
                if (!keyword || keyword.trim() === '') {
                    statsArea.innerText = '🕹️ 请输入关键词';
                    resultsContainer.innerHTML = `<div class="empty-state">📌 试试「钢铁森林」「蜜语纪」</div>`;
                    document.getElementById('filterBar').style.display = 'none';
                    return;
                }
                const kw = keyword.trim();
                currentKeyword = kw;
                currentFilterType = 'all';
                
                if (cache.has(kw)) {
                    const cached = cache.get(kw);
                    currentRawResults = cached.allResults;
                    const types = extractDiskTypesFromResults(currentRawResults);
                    renderFilterBar(types);
                    applyFilterAndRender();
                    statsArea.innerHTML = `⚡ 缓存 · 共 ${cached.total} 条 · 支持筛选`;
                    return;
                }
                
                statsArea.innerText = `🚀 代理搜索: ${kw}`;
                showLoading();
                
                try {
                    const apiUrl = buildApiUrl(kw);
                    const data = await fetchWithTimeout(apiUrl, 9000, 1);
                    if (data.code !== 0 || !data.data) throw new Error(data.message || '接口异常');
                    
                    const mergedByType = data.data.merged_by_type || {};
                    let allResults = [];
                    for (let type in mergedByType) {
                        if (Array.isArray(mergedByType[type])) allResults = allResults.concat(mergedByType[type]);
                    }
                    if (allResults.length === 0) {
                        renderEmptyOrError('empty', kw);
                        currentRawResults = [];
                        return;
                    }
                    
                    const total = data.data.total || allResults.length;
                    currentRawResults = allResults;
                    cache.set(kw, { allResults, total });
                    if (cache.size > 50) {
                        const firstKey = cache.keys().next().value;
                        cache.delete(firstKey);
                    }
                    const diskTypes = extractDiskTypesFromResults(allResults);
                    renderFilterBar(diskTypes);
                    applyFilterAndRender();
                    statsArea.innerHTML = `✅ ${total} 条资源 · ${diskTypes.length} 种网盘 · 已缓存`;
                } catch (err) {
                    console.error(err);
                    showError(err.message || '网络或代理错误，请重试');
                }
            }

            function preloadHotKeywords() {
                const hot = ['短剧', '死神来了', '钢铁森林', '4K电影'];
                if ('requestIdleCallback' in window) {
                    requestIdleCallback(() => hot.forEach(kw => { if (!cache.has(kw)) fetchWithTimeout(buildApiUrl(kw), 10000, 0).catch(()=>{}); }));
                } else {
                    setTimeout(() => hot.forEach(kw => { if (!cache.has(kw)) fetchWithTimeout(buildApiUrl(kw), 10000, 0).catch(()=>{}); }), 2000);
                }
            }

            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const statsArea = document.getElementById('statsArea');
            const clearFilterBtn = document.getElementById('clearFilterBtn');
            
            searchBtn.addEventListener('click', () => searchResources(searchInput.value));
            searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchResources(searchInput.value); });
            if (clearFilterBtn) {
                clearFilterBtn.addEventListener('click', () => {
                    if (currentRawResults.length) {
                        currentFilterType = 'all';
                        applyFilterAndRender();
                        const types = extractDiskTypesFromResults(currentRawResults);
                        renderFilterBar(types);
                        updateFilterActiveUI();
                    }
                });
            }
            
            const themeToggle = document.getElementById('themeToggle');
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark');
                themeToggle.textContent = '☀️';
            }
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark');
                const isDark = document.body.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                themeToggle.textContent = isDark ? '☀️' : '🌙';
            });
            
            window.addEventListener('load', () => {
                preloadHotKeywords();
                // 自动搜索预设词 "钢铁森林"
                if (searchInput.value === '钢铁森林') {
                    searchResources('钢铁森林');
                }
            });
        })();
    </script>
</body>
</html>
