<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>小钱全网盘搜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-deep: #0d1117;
            --bg-card: rgba(255, 255, 255, 0.06);
            --bg-card-hover: rgba(255, 255, 255, 0.10);
            --border: rgba(255, 255, 255, 0.10);
            --border-hover: rgba(255, 255, 255, 0.22);
            --text-primary: #f0f2f8;
            --text-muted: rgba(240, 242, 248, 0.55);
            --accent-teal: #6dd5ed;
            --accent-gold: #e0b97a;
            --accent-purple: #c084fc;
            --radius: 16px;
            --ease: cubic-bezier(0.22, 1, 0.36, 1);
        }

        body {
            min-height: 100vh;
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: -apple-system, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
            padding: 20px 16px 80px;
        }

        /* 极光画布 + 噪点 */
        #aurora-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .noise-overlay {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.032'/%3E%3C/svg%3E");
            background-size: 200px;
            pointer-events: none;
            z-index: 1;
        }

        /* 主容器 */
        .main-wrap {
            position: relative;
            z-index: 2;
            max-width: 860px;
            margin: 0 auto;
        }

        /* 顶部装饰 + 标题 */
        .hero {
            text-align: center;
            padding: 18px 0 24px;
            animation: fadeUp 0.8s var(--ease) both;
        }
        .hero-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent-teal);
            margin: 0 auto 20px;
            box-shadow: 0 0 16px var(--accent-teal);
            animation: pulseGlow 2.6s ease infinite;
        }
        @keyframes pulseGlow {
            0%,100% { transform: scale(1); opacity: 0.9; box-shadow: 0 0 12px var(--accent-teal);}
            50% { transform: scale(0.65); opacity: 0.5; box-shadow: 0 0 4px var(--accent-teal);}
        }
        .page-title {
            font-size: clamp(28px, 6vw, 44px);
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #e0b97a 0%, #f5d9a0 25%, #6dd5ed 60%, #c084fc 85%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmerFlow 6s ease infinite;
            margin-bottom: 6px;
        }
        @keyframes shimmerFlow {
            0%,100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .sub-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.3px;
        }

        /* 搜索栏 仿ios毛玻璃 */
        .search-section {
            margin: 16px 0 28px;
            animation: fadeUp 0.7s 0.1s var(--ease) both;
        }
        .search-glass {
            display: flex;
            gap: 12px;
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 4px 4px 4px 20px;
            transition: all 0.25s;
        }
        .search-glass:focus-within {
            border-color: rgba(109, 213, 237, 0.5);
            background: rgba(255, 255, 255, 0.09);
            box-shadow: 0 0 0 2px rgba(109, 213, 237, 0.2);
        }
        .search-glass input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            font-size: 0.95rem;
            color: var(--text-primary);
            outline: none;
            font-family: inherit;
        }
        .search-glass input::placeholder {
            color: var(--text-muted);
        }
        .search-glass button {
            background: var(--accent-teal);
            border: none;
            padding: 0 22px;
            border-radius: 50px;
            color: #0a0f16;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(4px);
            letter-spacing: 0.3px;
        }
        .search-glass button:active {
            transform: scale(0.96);
        }
        .stats-tip {
            margin-top: 12px;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
            background: rgba(109, 213, 237, 0.08);
            display: inline-block;
            width: auto;
            padding: 6px 16px;
            border-radius: 60px;
            backdrop-filter: blur(12px);
        }

        /* 筛选栏（胶囊） */
        .filter-bar {
            margin: 20px 0 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 8px 16px;
        }
        .filter-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--accent-gold);
            padding-left: 6px;
        }
        .filter-chip {
            background: rgba(255, 255, 255, 0.06);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-muted);
            border: none;
            backdrop-filter: blur(8px);
        }
        .filter-chip.active {
            background: var(--accent-teal);
            color: #0a0f16;
            box-shadow: 0 2px 12px rgba(109, 213, 237, 0.3);
        }
        .filter-chip:hover:not(.active) {
            background: rgba(255, 255, 255, 0.12);
            color: white;
        }
        .clear-filter {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
            margin-left: auto;
        }
        .clear-filter:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--accent-teal);
        }

        /* 卡片列表 */
        .results-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .resource-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.25s var(--ease);
            animation: fadeUp 0.5s var(--ease) both;
        }
        .resource-card:hover {
            border-color: var(--border-hover);
            background: rgba(255, 255, 255, 0.09);
            transform: translateY(-2px);
        }
        .card-inner {
            padding: 18px 20px;
        }
        .res-title {
            font-weight: 700;
            font-size: 1rem;
            line-height: 1.4;
            margin-bottom: 12px;
            letter-spacing: -0.2px;
            color: #f0f2f8;
        }
        .meta-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        .badge {
            background: rgba(255, 255, 255, 0.07);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 500;
            color: var(--text-muted);
        }
        .badge-pwd {
            background: rgba(224, 185, 122, 0.15);
            color: #e0b97a;
        }
        .desc-note {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin: 10px 0;
            background: rgba(109, 213, 237, 0.05);
            padding: 8px 12px;
            border-radius: 14px;
            line-height: 1.4;
        }
        .open-link-btn {
            display: block;
            background: rgba(109, 213, 237, 0.12);
            border: 0.5px solid rgba(109, 213, 237, 0.3);
            color: var(--accent-teal);
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 44px;
            font-weight: 500;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 14px;
            transition: 0.2s;
        }
        .open-link-btn:hover {
            background: var(--accent-teal);
            color: #0a0f16;
            border-color: var(--accent-teal);
        }
        .card-footer {
            border-top: 0.5px solid var(--border);
            padding: 10px 20px;
            font-size: 0.65rem;
            display: flex;
            justify-content: space-between;
            color: rgba(240, 242, 248, 0.4);
        }

        .empty-state, .error-state {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 48px 24px;
            text-align: center;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .loading-state {
            text-align: center;
            padding: 48px;
            color: var(--accent-teal);
        }
        .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 2px solid rgba(109, 213, 237, 0.2);
            border-top-color: var(--accent-teal);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 极简toast */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(13, 17, 23, 0.92);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(109, 213, 237, 0.4);
            padding: 8px 22px;
            border-radius: 60px;
            color: var(--accent-teal);
            font-size: 0.75rem;
            z-index: 999;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 560px) {
            body { padding: 16px 14px 70px; }
            .search-glass { padding-left: 16px; }
            .search-glass button { padding: 0 18px; font-size: 0.8rem; }
            .filter-bar { padding: 6px 12px; gap: 6px; }
            .filter-chip { padding: 4px 14px; font-size: 0.7rem; }
            .card-inner { padding: 14px 16px; }
        }
    </style>
</head>
<body>

<canvas id="aurora-canvas"></canvas>
<div class="noise-overlay"></div>

<div class="main-wrap">
    <div class="hero">
        <div class="hero-dot"></div>
        <h1 class="page-title">小钱全网盘搜</h1>
        <div class="sub-desc">极光引擎 · 分类筛选 · 智能缓存</div>
    </div>

    <div class="search-section">
        <div class="search-glass">
            <input type="text" id="searchKeyword" placeholder="电影、剧集、短剧、书籍、资料..." autocomplete="off">
            <button id="searchBtn">搜索</button>
        </div>
        <div id="statsInfo" class="stats-tip">✨ 代理加速已启用 · 支持网盘分类筛选</div>
    </div>

    <!-- 动态筛选栏 -->
    <div id="filterArea" class="filter-bar" style="display: none;">
        <span class="filter-label">📂 按网盘筛选</span>
        <div id="filterChipsContainer" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
        <button id="clearFilter" class="clear-filter">清除</button>
    </div>

    <div id="resultsContainer" class="results-list">
        <div class="empty-state">
            🌌 极光风格 · 全网盘资源聚合<br>
            ✅ 百度/阿里/夸克/迅雷 智能分类<br>
            💡 试试「钢铁森林」「短剧」「蜜语纪」
        </div>
    </div>
</div>

<div id="copyToast" class="toast-msg">📋 链接已复制，新窗口打开</div>

<script>
    (function() {
        // ---------- 极光动画 ----------
        const canvas = document.getElementById('aurora-canvas');
        let ctx = canvas.getContext('2d');
        let w, h, time = 0;
        let animationId;
        let active = true;

        function resizeCanvas() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', () => { resizeCanvas(); });
        resizeCanvas();

        const bands = [
            { color: [80, 220, 200], baseY: 0.24, amp: 0.09, freq: 0.5, speed: 0.28, width: 0.42, alpha: 0.20 },
            { color: [160, 100, 255], baseY: 0.36, amp: 0.07, freq: 0.42, speed: 0.22, width: 0.35, alpha: 0.18 },
            { color: [60, 200, 255], baseY: 0.18, amp: 0.11, freq: 0.68, speed: 0.32, width: 0.28, alpha: 0.15 },
            { color: [200, 140, 255], baseY: 0.48, amp: 0.06, freq: 0.28, speed: 0.18, width: 0.32, alpha: 0.13 },
            { color: [100, 240, 180], baseY: 0.12, amp: 0.08, freq: 0.55, speed: 0.24, width: 0.24, alpha: 0.12 }
        ];

        function drawBand(b) {
            const yCenter = b.baseY * h + Math.sin(time * b.speed + 1.4) * b.amp * h;
            const bandHeight = b.width * h;
            const [r, g, bl] = b.color;

            ctx.beginPath();
            for (let i = 0; i <= 120; i++) {
                const x = (i / 120) * w;
                const wave = Math.sin(i * b.freq * 0.08 + time * b.speed) * 14
                            + Math.sin(i * b.freq * 0.14 + time * b.speed * 1.2 + 2) * 8
                            + Math.sin(i * b.freq * 0.03 + time * b.speed * 0.6) * 20;
                if (i === 0) ctx.moveTo(x, yCenter + wave);
                else ctx.lineTo(x, yCenter + wave);
            }
            ctx.lineTo(w, yCenter + bandHeight);
            ctx.lineTo(0, yCenter + bandHeight);
            ctx.closePath();

            const grad = ctx.createLinearGradient(0, yCenter - bandHeight * 0.3, 0, yCenter + bandHeight);
            grad.addColorStop(0, `rgba(${r},${g},${bl},0)`);
            grad.addColorStop(0.2, `rgba(${r},${g},${bl},${b.alpha})`);
            grad.addColorStop(0.55, `rgba(${r},${g},${bl},${b.alpha * 0.5})`);
            grad.addColorStop(1, `rgba(${r},${g},${bl},0)`);
            ctx.fillStyle = grad;
            ctx.fill();
        }

        function drawAurora() {
            if (!ctx) return;
            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = '#0d1117';
            ctx.fillRect(0, 0, w, h);
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            bands.forEach(b => drawBand(b));
            ctx.restore();

            const fadeGrad = ctx.createLinearGradient(0, h * 0.5, 0, h);
            fadeGrad.addColorStop(0, 'rgba(13,17,23,0)');
            fadeGrad.addColorStop(1, 'rgba(13,17,23,0.85)');
            ctx.fillStyle = fadeGrad;
            ctx.fillRect(0, h * 0.5, w, h * 0.5);
        }

        function animate() {
            if (!active && !document.hasFocus()) {
                animationId = requestAnimationFrame(animate);
                return;
            }
            time += 0.008;
            drawAurora();
            animationId = requestAnimationFrame(animate);
        }
        animate();

        document.addEventListener('visibilitychange', () => {
            active = !document.hidden;
        });

        // ---------- 搜索核心 ----------
        const ORIGIN_API = 'https://so.252035.xyz/api/search?kw=';
        const PROXY_API = 'https://proxy.api.030101.xyz/';
        const USE_PROXY = true;
        function buildApiUrl(kw) {
            const encoded = encodeURIComponent(kw);
            return USE_PROXY ? PROXY_API + ORIGIN_API + encoded : ORIGIN_API + encoded;
        }

        const cache = new Map();
        let currentFilter = 'all';
        let currentResults = [];
        let currentKeyword = '';

        // 网盘识别
        function getDiskDisplay(url) {
            if (!url) return '🔗 链接';
            const u = url.toLowerCase();
            if (u.includes('pan.baidu.com') || u.includes('baidu.com/s/')) return '📀 百度网盘';
            if (u.includes('aliyundrive.com') || u.includes('alipan.com')) return '☁️ 阿里云盘';
            if (u.includes('quark.cn') || u.includes('pan.quark.cn')) return '⚛️ 夸克网盘';
            if (u.includes('xunlei.com') || u.includes('pan.xunlei.com')) return '⚡ 迅雷网盘';
            return '🔗 网盘链接';
        }
        function getPureDisk(url) {
            const d = getDiskDisplay(url);
            if (d === '📀 百度网盘') return '百度网盘';
            if (d === '☁️ 阿里云盘') return '阿里云盘';
            if (d === '⚛️ 夸克网盘') return '夸克网盘';
            if (d === '⚡ 迅雷网盘') return '迅雷网盘';
            return '其他';
        }

        function extractDiskTypes(results) {
            const set = new Set();
            for (const item of results) {
                const pure = getPureDisk(item.url);
                if (pure !== '其他') set.add(pure);
            }
            const order = ['百度网盘', '阿里云盘', '夸克网盘', '迅雷网盘'];
            return order.filter(t => set.has(t));
        }

        // 渲染筛选UI
        function renderFilterBar(types) {
            const filterDiv = document.getElementById('filterArea');
            const chipsContainer = document.getElementById('filterChipsContainer');
            if (!types.length) {
                filterDiv.style.display = 'none';
                return;
            }
            filterDiv.style.display = 'flex';
            chipsContainer.innerHTML = '';
            const allChip = document.createElement('button');
            allChip.className = `filter-chip ${currentFilter === 'all' ? 'active' : ''}`;
            allChip.textContent = `全部 (${currentResults.length})`;
            allChip.addEventListener('click', () => {
                currentFilter = 'all';
                applyFilterAndRender();
                updateFilterActiveUI();
            });
            chipsContainer.appendChild(allChip);
            types.forEach(type => {
                const count = currentResults.filter(item => getPureDisk(item.url) === type).length;
                const chip = document.createElement('button');
                chip.className = `filter-chip ${currentFilter === type ? 'active' : ''}`;
                chip.textContent = `${type} (${count})`;
                chip.addEventListener('click', () => {
                    currentFilter = type;
                    applyFilterAndRender();
                    updateFilterActiveUI();
                });
                chipsContainer.appendChild(chip);
            });
        }

        function updateFilterActiveUI() {
            document.querySelectorAll('.filter-chip').forEach(chip => {
                const text = chip.textContent.split(' ')[0];
                if (currentFilter === 'all' && text === '全部') chip.classList.add('active');
                else if (currentFilter !== 'all' && text === currentFilter) chip.classList.add('active');
                else chip.classList.remove('active');
            });
        }

        function applyFilterAndRender() {
            if (!currentResults.length) { renderEmpty(currentKeyword); return; }
            let filtered = [...currentResults];
            if (currentFilter !== 'all') {
                filtered = filtered.filter(item => getPureDisk(item.url) === currentFilter);
            }
            if (filtered.length === 0) {
                document.getElementById('resultsContainer').innerHTML = `<div class="empty-state">😶 筛选“${currentFilter}”下暂无资源<br>💡 试试清除筛选</div>`;
                document.getElementById('statsInfo').innerText = `🔍 共 ${currentResults.length} 条 · 筛选0条`;
                return;
            }
            renderResultCards(filtered);
            document.getElementById('statsInfo').innerHTML = `✅ 共 ${currentResults.length} 条资源 · 展示 ${filtered.length} 条 (筛选: ${currentFilter === 'all' ? '全部' : currentFilter}) · 已缓存`;
        }

        function formatDate(dt) {
            if (!dt || dt.startsWith('0001')) return '日期未知';
            try {
                const d = new Date(dt);
                if (isNaN(d.getTime())) return dt.split('T')[0];
                return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
            } catch(e) { return dt; }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
        }

        function renderResultCards(items) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';
            for (const it of items) {
                const title = it.note || it.title || '资源';
                const url = it.url || '#';
                const pwd = it.password || '';
                const source = it.source || '共享源';
                const date = it.datetime ? formatDate(it.datetime) : '时间未知';
                const disk = getDiskDisplay(url);
                const card = `
                    <div class="resource-card">
                        <div class="card-inner">
                            <div class="res-title">${escapeHtml(title)}</div>
                            <div class="meta-badges">
                                <span class="badge">${disk}</span>
                                <span class="badge">📅 ${date}</span>
                                <span class="badge">📡 ${escapeHtml(source)}</span>
                                ${pwd ? `<span class="badge badge-pwd">🔑 提取码: ${escapeHtml(pwd)}</span>` : ''}
                            </div>
                            ${it.note && it.note !== title ? `<div class="desc-note">📄 ${escapeHtml(it.note.substring(0, 140))}${it.note.length > 140 ? '…' : ''}</div>` : ''}
                            <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" class="open-link-btn">打开资源链接 ↗</a>
                        </div>
                        <div class="card-footer">
                            <span>来源: ${escapeHtml(source)}</span>
                            ${pwd ? `<span>密码: ${escapeHtml(pwd)}</span>` : '<span>无密码</span>'}
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', card);
            }
            if (items.length > 30) {
                const tip = document.createElement('div');
                tip.className = 'stats-tip';
                tip.style.marginTop = '16px';
                tip.style.textAlign = 'center';
                tip.innerText = `✨ 共 ${items.length} 条结果，全部展示`;
                container.appendChild(tip);
            }
        }

        function renderEmpty(kw) {
            const container = document.getElementById('resultsContainer');
            if (kw) {
                container.innerHTML = `<div class="empty-state">🔍 未找到 “${escapeHtml(kw)}” 的资源<br>💡 试试「钢铁森林」「短剧」「蜜语纪」</div>`;
                document.getElementById('statsInfo').innerText = `无结果: ${kw}`;
            } else {
                container.innerHTML = `<div class="empty-state">🌌 极光风格 · 全网盘资源聚合<br>✅ 百度/阿里/夸克/迅雷 智能分类<br>💡 试试「钢铁森林」「短剧」「蜜语纪」</div>`;
                document.getElementById('statsInfo').innerText = `✨ 代理加速已启用 · 支持网盘分类筛选`;
            }
            document.getElementById('filterArea').style.display = 'none';
        }

        function showLoading() {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = `<div class="loading-state"><div class="spinner"></div><div style="margin-top:12px;">极光引擎搜索中...</div></div>`;
            document.getElementById('filterArea').style.display = 'none';
        }

        async function fetchWithTimeout(url, timeout = 9000, retries = 2) {
            for (let i = 0; i <= retries; i++) {
                try {
                    const ctrl = new AbortController();
                    const tid = setTimeout(() => ctrl.abort(), timeout);
                    const res = await fetch(url, { signal: ctrl.signal, headers: { 'Accept': 'application/json' } });
                    clearTimeout(tid);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return await res.json();
                } catch (err) {
                    if (i === retries) throw err;
                    await new Promise(r => setTimeout(r, 550));
                }
            }
        }

        async function searchResources(keyword) {
            const kw = keyword.trim();
            if (!kw) {
                document.getElementById('statsInfo').innerText = '🕹️ 请输入关键词';
                document.getElementById('resultsContainer').innerHTML = `<div class="empty-state">📌 试试「钢铁森林」「短剧」「蜜语纪」</div>`;
                document.getElementById('filterArea').style.display = 'none';
                return;
            }
            currentKeyword = kw;
            currentFilter = 'all';
            if (cache.has(kw)) {
                const cached = cache.get(kw);
                currentResults = cached.allResults;
                const types = extractDiskTypes(currentResults);
                renderFilterBar(types);
                applyFilterAndRender();
                document.getElementById('statsInfo').innerHTML = `⚡ 缓存命中 · 共 ${cached.total} 条 · 支持筛选`;
                return;
            }
            showLoading();
            try {
                const url = buildApiUrl(kw);
                const data = await fetchWithTimeout(url, 9000, 2);
                if (data.code !== 0 || !data.data) throw new Error('接口异常');
                const merged = data.data.merged_by_type || {};
                let all = [];
                for (let t in merged) {
                    if (Array.isArray(merged[t])) all = all.concat(merged[t]);
                }
                if (!all.length) {
                    renderEmpty(kw);
                    currentResults = [];
                    return;
                }
                const total = data.data.total || all.length;
                currentResults = all;
                cache.set(kw, { allResults: all, total });
                if (cache.size > 45) {
                    const first = cache.keys().next().value;
                    cache.delete(first);
                }
                const diskTypes = extractDiskTypes(all);
                renderFilterBar(diskTypes);
                applyFilterAndRender();
            } catch (err) {
                console.error(err);
                document.getElementById('resultsContainer').innerHTML = `<div class="error-state">⚠️ 请求失败: 网络波动或代理超时<br>🔄 请重试</div>`;
                document.getElementById('statsInfo').innerText = `❌ 搜索失败`;
                document.getElementById('filterArea').style.display = 'none';
            }
        }

        // 预加载热门（静默）
        function preloadHot() {
            const hot = ['短剧', '钢铁森林', '死神来了'];
            hot.forEach(kw => {
                if (!cache.has(kw)) fetchWithTimeout(buildApiUrl(kw), 10000, 0).catch(()=>{});
            });
        }

        // 绑定事件
        const searchInput = document.getElementById('searchKeyword');
        const searchBtn = document.getElementById('searchBtn');
        const clearFilterBtn = document.getElementById('clearFilter');
        searchBtn.addEventListener('click', () => searchResources(searchInput.value));
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchResources(searchInput.value); });
        if (clearFilterBtn) {
            clearFilterBtn.addEventListener('click', () => {
                if (currentResults.length) {
                    currentFilter = 'all';
                    applyFilterAndRender();
                    const types = extractDiskTypes(currentResults);
                    renderFilterBar(types);
                    updateFilterActiveUI();
                }
            });
        }

        // 复制toast逻辑
        document.addEventListener('click', (e) => {
            const link = e.target.closest('.open-link-btn');
            if (link && link.href) {
                e.preventDefault();
                const href = link.getAttribute('href');
                navigator.clipboard.writeText(href).catch(()=>{});
                const toast = document.getElementById('copyToast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 1400);
                window.open(href, '_blank');
            }
        });

        window.addEventListener('load', () => {
            preloadHot();
            searchInput.value = '';
            renderEmpty('');
        });
    })();
</script>
</body>
</html>
