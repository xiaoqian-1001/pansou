<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>小钱全网盘搜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* iOS 26 风格变量 */
        :root {
            --bg-color: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.88);
            --text-primary: #1d1c1f;
            --text-secondary: #6c6c70;
            --text-tertiary: #8e8e93;
            --border-color: rgba(224, 224, 230, 0.6);
            --accent-color: #007aff;
            --accent-hover: #005fc1;
            --glass-bg: rgba(255, 255, 255, 0.72);
            --result-bg: rgba(0, 122, 255, 0.08);
            --input-bg: rgba(255, 255, 255, 0.8);
            --tag-bg: #e9e9ef;
            --password-tag: #fff0e6;
            --filter-active: #007aff;
            --filter-inactive: #e9e9ef;
            --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.04), 0 0 0 0.5px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 8px 28px rgba(0, 0, 0, 0.08), 0 0 0 0.5px rgba(0, 0, 0, 0.02);
            --blur-bg: saturate(180%) blur(20px);
        }

        body.dark {
            --bg-color: #000000;
            --card-bg: rgba(28, 28, 30, 0.88);
            --text-primary: #ffffff;
            --text-secondary: #98989e;
            --text-tertiary: #6c6c70;
            --border-color: rgba(56, 56, 62, 0.8);
            --accent-color: #0a84ff;
            --accent-hover: #409cff;
            --glass-bg: rgba(28, 28, 30, 0.78);
            --result-bg: rgba(10, 132, 255, 0.12);
            --input-bg: rgba(28, 28, 30, 0.8);
            --tag-bg: #2c2c2e;
            --password-tag: #3a2a1f;
            --filter-active: #0a84ff;
            --filter-inactive: #2c2c2e;
            --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.3), 0 0 0 0.5px rgba(255, 255, 255, 0.05);
            --shadow-md: 0 8px 28px rgba(0, 0, 0, 0.4), 0 0 0 0.5px rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: -apple-system, 'SF Pro Text', 'SF Pro Display', system-ui, 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        /* 主布局 */
        .app-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航栏 */
        .ios-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: var(--blur-bg);
            -webkit-backdrop-filter: var(--blur-bg);
            border-bottom: 0.5px solid var(--border-color);
        }

        .nav-inner {
            max-width: 720px;
            margin: 0 auto;
            padding: 12px 20px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .theme-toggle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--tag-bg);
            border: none;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            color: var(--text-primary);
        }

        .theme-toggle:hover {
            transform: scale(1.02);
            background: var(--filter-inactive);
        }

        /* 主内容区 - 居中 */
        .main-container {
            flex: 1;
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            padding: 20px 20px 40px;
        }

        /* 搜索卡片 - 所有内容居中 */
        .search-card {
            background: var(--card-bg);
            backdrop-filter: var(--blur-bg);
            -webkit-backdrop-filter: var(--blur-bg);
            border-radius: 28px;
            padding: 32px 24px;
            margin-bottom: 20px;
            border: 0.5px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #007aff, #5856d6, #ff2d55);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .sub {
            color: var(--text-secondary);
            margin-bottom: 28px;
            font-size: 0.9rem;
            font-weight: 400;
        }

        .search-box {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-input {
            flex: 1;
            min-width: 240px;
            max-width: 400px;
            padding: 14px 20px;
            font-size: 1rem;
            border: 0.5px solid var(--border-color);
            border-radius: 44px;
            background: var(--input-bg);
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s;
            text-align: left;
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
        }

        .search-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 44px;
            padding: 0 28px;
            font-size: 1rem;
            font-weight: 590;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-btn:active {
            transform: scale(0.97);
        }

        .stats-badge {
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--text-tertiary);
            background: var(--result-bg);
            padding: 6px 16px;
            border-radius: 40px;
            display: inline-block;
        }

        /* 筛选栏 */
        .filter-bar {
            margin: 16px 0 24px 0;
            background: var(--card-bg);
            backdrop-filter: var(--blur-bg);
            border-radius: 48px;
            padding: 8px 16px;
            border: 0.5px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            justify-content: flex-start;
        }

        .filter-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            padding-left: 6px;
        }

        .filter-chip {
            background: var(--filter-inactive);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-primary);
            border: none;
        }

        .filter-chip.active {
            background: var(--filter-active);
            color: white;
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.25);
        }

        .filter-chip:hover:not(.active) {
            background: var(--border-color);
        }

        .clear-filter {
            background: transparent;
            border: 0.5px solid var(--border-color);
            color: var(--text-secondary);
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            margin-left: auto;
        }

        .clear-filter:hover {
            background: var(--result-bg);
            color: var(--accent-color);
        }

        /* 结果列表 */
        .results-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .result-card {
            background: var(--card-bg);
            backdrop-filter: var(--blur-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 0.5px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: var(--shadow-sm);
        }

        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .card-inner {
            padding: 18px 20px;
        }

        .resource-title {
            font-weight: 630;
            font-size: 1.1rem;
            line-height: 1.35;
            margin-bottom: 12px;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }

        .tag {
            background: var(--tag-bg);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .tag-pwd {
            background: var(--password-tag);
            color: #c45c1a;
        }

        .desc-note {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin: 12px 0;
            background: var(--result-bg);
            padding: 10px 14px;
            border-radius: 16px;
            word-break: break-word;
        }

        .open-link {
            display: block;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 12px 18px;
            border-radius: 44px;
            font-weight: 590;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 14px;
            transition: 0.2s;
        }

        .open-link:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        .card-footer {
            border-top: 0.5px solid var(--border-color);
            padding: 12px 20px;
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
            color: var(--text-tertiary);
        }

        .empty-box, .error-box {
            background: var(--card-bg);
            backdrop-filter: var(--blur-bg);
            border-radius: 28px;
            padding: 52px 24px;
            text-align: center;
            color: var(--text-secondary);
            border: 0.5px solid var(--border-color);
        }

        .loading-box {
            text-align: center;
            padding: 52px;
            color: var(--accent-color);
        }

        .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 2.5px solid var(--border-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 560px) {
            .main-container { padding: 16px; }
            .search-card { padding: 24px 18px; }
            h1 { font-size: 1.7rem; }
            .search-input { padding: 12px 18px; min-width: 180px; }
            .search-btn { padding: 0 22px; }
            .filter-chip { padding: 5px 14px; font-size: 0.75rem; }
            .card-inner { padding: 16px; }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <!-- 顶部导航栏 -->
    <div class="ios-nav">
        <div class="nav-inner">
            <button class="theme-toggle" id="themeToggle" aria-label="深色模式">🌙</button>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-container">
        <div class="search-card">
            <h1>小钱全网盘搜</h1>
            <div class="sub">🚀 代理加速 · 智能缓存 · 按盘分类筛选</div>
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="电影、剧集、短剧、书籍、资料..." autocomplete="off">
                <button id="searchBtn" class="search-btn">搜索</button>
            </div>
            <div id="statsArea" class="stats-badge">✨ 已启用加速代理 · 支持网盘筛选</div>
        </div>

        <!-- 筛选栏（动态出现） -->
        <div id="filterBar" class="filter-bar" style="display: none;">
            <span class="filter-label">📂 网盘筛选</span>
            <div id="filterChipsContainer" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
            <button id="clearFilterBtn" class="clear-filter">清除</button>
        </div>

        <!-- 搜索结果容器 -->
        <div id="resultsContainer" class="results-list">
            <div class="empty-box">
                🍃 iOS 26 风格 · 轻量流畅<br>
                ✅ 百度 / 阿里 / 夸克 / 迅雷 分类筛选<br>
                💡 试试「钢铁森林」「短剧」「蜜语纪」
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- 配置 ----------
        const ORIGIN_API = 'https://so.252035.xyz/api/search?kw=';
        const PROXY_API = 'https://proxy.api.030101.xyz/';
        const USE_PROXY = true;
        function buildApiUrl(kw) {
            const encoded = encodeURIComponent(kw);
            return USE_PROXY ? PROXY_API + ORIGIN_API + encoded : ORIGIN_API + encoded;
        }

        // 全局状态
        const cache = new Map();
        let currentFilter = 'all';
        let currentResults = [];
        let currentKeyword = '';

        // ---------- 网盘识别 ----------
        function getDiskDisplay(url) {
            if (!url) return '🔗 网盘链接';
            const u = url.toLowerCase();
            if (u.includes('pan.baidu.com') || u.includes('baidu.com/s/')) return '📀 百度网盘';
            if (u.includes('aliyundrive.com') || u.includes('alipan.com')) return '☁️ 阿里云盘';
            if (u.includes('quark.cn') || u.includes('pan.quark.cn')) return '⚛️ 夸克网盘';
            if (u.includes('xunlei.com') || u.includes('pan.xunlei.com') || u.includes('xlsony.com')) return '⚡ 迅雷网盘';
            return '🔗 网盘链接';
        }
        function getPureDisk(url) {
            const d = getDiskDisplay(url);
            if (d === '📀 百度网盘') return '百度网盘';
            if (d === '☁️ 阿里云盘') return '阿里云盘';
            if (d === '⚛️ 夸克网盘') return '夸克网盘';
            if (d === '⚡ 迅雷网盘') return '迅雷网盘';
            return '其他';
        }

        function extractDiskTypes(results) {
            const set = new Set();
            for (const item of results) {
                const pure = getPureDisk(item.url);
                if (pure !== '其他') set.add(pure);
            }
            const order = ['百度网盘', '阿里云盘', '夸克网盘', '迅雷网盘'];
            return order.filter(t => set.has(t));
        }

        // ---------- UI 渲染 ----------
        function renderFilterBar(types) {
            const filterBar = document.getElementById('filterBar');
            const chipsContainer = document.getElementById('filterChipsContainer');
            if (!chipsContainer) return;
            if (!types.length) {
                filterBar.style.display = 'none';
                return;
            }
            filterBar.style.display = 'flex';
            chipsContainer.innerHTML = '';

            const allChip = document.createElement('button');
            allChip.className = `filter-chip ${currentFilter === 'all' ? 'active' : ''}`;
            allChip.textContent = `全部 (${currentResults.length})`;
            allChip.addEventListener('click', () => {
                currentFilter = 'all';
                applyFilterAndRender();
                updateFilterActiveUI();
            });
            chipsContainer.appendChild(allChip);

            types.forEach(type => {
                const count = currentResults.filter(item => getPureDisk(item.url) === type).length;
                const chip = document.createElement('button');
                chip.className = `filter-chip ${currentFilter === type ? 'active' : ''}`;
                chip.textContent = `${type} (${count})`;
                chip.addEventListener('click', () => {
                    currentFilter = type;
                    applyFilterAndRender();
                    updateFilterActiveUI();
                });
                chipsContainer.appendChild(chip);
            });
        }

        function updateFilterActiveUI() {
            const chips = document.querySelectorAll('.filter-chip');
            chips.forEach(chip => {
                const text = chip.textContent.split(' ')[0];
                if (currentFilter === 'all' && text === '全部') chip.classList.add('active');
                else if (currentFilter !== 'all' && text === currentFilter) chip.classList.add('active');
                else chip.classList.remove('active');
            });
        }

        function applyFilterAndRender() {
            if (!currentResults.length) {
                renderEmptyState(currentKeyword);
                return;
            }
            let filtered = [...currentResults];
            if (currentFilter !== 'all') {
                filtered = filtered.filter(item => getPureDisk(item.url) === currentFilter);
            }
            if (filtered.length === 0) {
                document.getElementById('resultsContainer').innerHTML = `<div class="empty-box">😶 筛选“${currentFilter}”下暂无资源<br>💡 试试清除筛选</div>`;
                const total = currentResults.length;
                document.getElementById('statsArea').innerText = `🔍 共 ${total} 条 · 筛选 0 条 (${currentFilter})`;
                return;
            }
            renderResultList(filtered);
            const total = currentResults.length;
            document.getElementById('statsArea').innerHTML = `✅ 共 ${total} 条资源 · 展示 ${filtered.length} 条 (筛选: ${currentFilter === 'all' ? '全部' : currentFilter}) · 已缓存`;
        }

        function formatDate(dt) {
            if (!dt || dt.startsWith('0001')) return '日期未知';
            try {
                const d = new Date(dt);
                if (isNaN(d.getTime())) return dt.split('T')[0];
                return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
            } catch(e) { return dt; }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
        }

        function renderResultList(items) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';
            for (const it of items) {
                const title = it.note || it.title || '未命名资源';
                const url = it.url || '#';
                const pwd = it.password || '';
                const source = it.source || '共享源';
                const date = it.datetime ? formatDate(it.datetime) : '时间未知';
                const noteDetail = it.note || '';
                const disk = getDiskDisplay(url);
                const card = `
                    <div class="result-card">
                        <div class="card-inner">
                            <div class="resource-title">${escapeHtml(title)}</div>
                            <div class="meta-row">
                                <span class="tag">${disk}</span>
                                <span class="tag">📅 ${date}</span>
                                <span class="tag">📡 ${escapeHtml(source)}</span>
                                ${pwd ? `<span class="tag tag-pwd">🔑 提取码: ${escapeHtml(pwd)}</span>` : ''}
                            </div>
                            ${noteDetail && noteDetail !== title ? `<div class="desc-note">📄 ${escapeHtml(noteDetail.substring(0, 160))}${noteDetail.length > 160 ? '…' : ''}</div>` : ''}
                            <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" class="open-link">打开资源链接 ↗</a>
                        </div>
                        <div class="card-footer">
                            <span>来源: ${escapeHtml(source)}</span>
                            ${pwd ? `<span>密码: ${escapeHtml(pwd)}</span>` : '<span>无密码</span>'}
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', card);
            }
            if (items.length > 30) {
                const tip = document.createElement('div');
                tip.className = 'stats-badge';
                tip.style.marginTop = '16px';
                tip.style.textAlign = 'center';
                tip.innerText = `✨ 共 ${items.length} 条结果，已全部展示`;
                container.appendChild(tip);
            }
        }

        function renderEmptyState(kw) {
            const container = document.getElementById('resultsContainer');
            if (kw) {
                container.innerHTML = `<div class="empty-box">🔍 未找到 “${escapeHtml(kw)}” 的相关资源<br>试试「钢铁森林」「短剧」等关键词</div>`;
                document.getElementById('statsArea').innerText = `无结果: ${kw}`;
            } else {
                container.innerHTML = `<div class="empty-box">🍃 iOS 26 风格 · 轻量流畅<br>✅ 百度 / 阿里 / 夸克 / 迅雷 分类筛选<br>💡 试试「钢铁森林」「短剧」「蜜语纪」</div>`;
                document.getElementById('statsArea').innerText = `✨ 已启用加速代理 · 支持网盘筛选`;
            }
        }

        function showLoading() {
            document.getElementById('resultsContainer').innerHTML = `<div class="loading-box"><div class="spinner"></div><div style="margin-top:12px;">正在加速搜索...</div></div>`;
            document.getElementById('filterBar').style.display = 'none';
        }

        function showError(msg) {
            document.getElementById('resultsContainer').innerHTML = `<div class="error-box">⚠️ 请求失败: ${escapeHtml(msg)}<br><br>🔄 请重试</div>`;
            document.getElementById('statsArea').innerText = `❌ 请求失败`;
            document.getElementById('filterBar').style.display = 'none';
            currentResults = [];
            currentFilter = 'all';
        }

        // ---------- 网络请求 ----------
        async function fetchWithTimeout(url, timeout = 9000, retries = 1) {
            for (let i = 0; i <= retries; i++) {
                try {
                    const ctrl = new AbortController();
                    const tid = setTimeout(() => ctrl.abort(), timeout);
                    const res = await fetch(url, { signal: ctrl.signal, headers: { 'Accept': 'application/json' } });
                    clearTimeout(tid);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return await res.json();
                } catch (e) {
                    if (i === retries) throw e;
                    await new Promise(r => setTimeout(r, 500));
                }
            }
        }

        async function searchResources(keyword) {
            const kw = keyword.trim();
            if (!kw) {
                document.getElementById('statsArea').innerText = '🔍 请输入关键词';
                document.getElementById('resultsContainer').innerHTML = `<div class="empty-box">📌 请输入电影、剧集、资源名称<br>💡 试试「钢铁森林」「短剧」「蜜语纪」</div>`;
                document.getElementById('filterBar').style.display = 'none';
                return;
            }
            currentKeyword = kw;
            currentFilter = 'all';

            if (cache.has(kw)) {
                const cached = cache.get(kw);
                currentResults = cached.allResults;
                const types = extractDiskTypes(currentResults);
                renderFilterBar(types);
                applyFilterAndRender();
                document.getElementById('statsArea').innerHTML = `⚡ 缓存 · 共 ${cached.total} 条 · 支持筛选`;
                return;
            }

            document.getElementById('statsArea').innerText = `🚀 代理搜索: ${kw}`;
            showLoading();

            try {
                const apiUrl = buildApiUrl(kw);
                const data = await fetchWithTimeout(apiUrl, 9000, 1);
                if (data.code !== 0 || !data.data) throw new Error(data.message || '接口异常');

                const merged = data.data.merged_by_type || {};
                let all = [];
                for (let t in merged) {
                    if (Array.isArray(merged[t])) all = all.concat(merged[t]);
                }
                if (all.length === 0) {
                    renderEmptyState(kw);
                    currentResults = [];
                    document.getElementById('filterBar').style.display = 'none';
                    return;
                }

                const total = data.data.total || all.length;
                currentResults = all;
                cache.set(kw, { allResults: all, total });
                if (cache.size > 50) {
                    const first = cache.keys().next().value;
                    cache.delete(first);
                }

                const diskTypes = extractDiskTypes(all);
                renderFilterBar(diskTypes);
                applyFilterAndRender();
                document.getElementById('statsArea').innerHTML = `✅ ${total} 条资源 · ${diskTypes.length} 种网盘 · 已缓存`;
            } catch (err) {
                console.error(err);
                showError(err.message || '网络错误，请重试');
            }
        }

        // 预加载热门词（静默，不自动搜索）
        function preloadHot() {
            const hot = ['短剧', '死神来了', '钢铁森林', '蜜语纪'];
            const loadOne = (kw) => {
                if (!cache.has(kw)) fetchWithTimeout(buildApiUrl(kw), 10000, 0).catch(()=>{});
            };
            if ('requestIdleCallback' in window) {
                requestIdleCallback(() => hot.forEach(loadOne));
            } else {
                setTimeout(() => hot.forEach(loadOne), 2000);
            }
        }

        // 绑定事件
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const clearFilterBtn = document.getElementById('clearFilterBtn');
        
        searchBtn.addEventListener('click', () => searchResources(searchInput.value));
        searchInput.addEventListener('keypress', (e) => { 
            if (e.key === 'Enter') searchResources(searchInput.value); 
        });
        
        if (clearFilterBtn) {
            clearFilterBtn.addEventListener('click', () => {
                if (currentResults.length) {
                    currentFilter = 'all';
                    applyFilterAndRender();
                    const types = extractDiskTypes(currentResults);
                    renderFilterBar(types);
                    updateFilterActiveUI();
                }
            });
        }

        // 主题切换
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
            themeToggle.textContent = '☀️';
        }
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeToggle.textContent = isDark ? '☀️' : '🌙';
        });

        // 页面加载：只预加载热门词，不自动搜索任何词
        window.addEventListener('load', () => {
            preloadHot();
            // 清空搜索框，显示欢迎状态
            searchInput.value = '';
            renderEmptyState('');
        });
    })();
</script>
</body>
</html>
