<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>小钱全网盘搜 · 终极完整版</title>

<style>
body{
font-family:system-ui;
background:#f5f7fb;
margin:0;
}
h1{
text-align:center;
margin-top:40px;
background:linear-gradient(90deg,#4a6cf7,#ff6b6b);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* 搜索 */
.search{
display:flex;
justify-content:center;
gap:10px;
margin:20px;
}
input{
padding:12px 20px;
border-radius:40px;
border:1px solid #ddd;
}
button{
border:none;
padding:12px 25px;
border-radius:40px;
background:#4a6cf7;
color:#fff;
}

/* 筛选 */
.filter{
text-align:center;
margin:10px;
}
.filter button{
margin:5px;
padding:6px 14px;
border-radius:20px;
border:none;
background:#eee;
cursor:pointer;
}
.filter .active{
background:#4a6cf7;
color:#fff;
}

/* 卡片 */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:20px;
padding:20px;
}
.card{
background:#fff;
padding:20px;
border-radius:20px;
transition:.3s;
}
.card:hover{
transform:translateY(-5px);
box-shadow:0 20px 40px rgba(0,0,0,.2);
}
.tag{
background:#eef2ff;
padding:4px 10px;
border-radius:20px;
font-size:12px;
margin:3px;
display:inline-block;
}
</style>
</head>

<body>

<h1>小钱全网盘搜</h1>

<div class="search">
<input id="kw" placeholder="搜索资源">
<button onclick="search()">搜索</button>
</div>

<div id="filter" class="filter"></div>
<div id="grid" class="grid"></div>

<audio id="music"></audio>

<script>

/* ========= 多接口 ========= */
const APIs=[
'https://so.252035.xyz/api/search?kw=',
'https://api2.example.com/search?kw='
];

/* ========= 缓存 ========= */
function setCache(k,v){
localStorage.setItem(k,JSON.stringify({t:Date.now(),v}));
}
function getCache(k){
let d=localStorage.getItem(k);
if(!d)return null;
d=JSON.parse(d);
if(Date.now()-d.t>3600000)return null;
return d.v;
}

/* ========= 标签 ========= */
function getTags(t){
let r=[];
if(/4k/i.test(t))r.push('4K');
if(/1080/i.test(t))r.push('1080P');
if(/完结/.test(t))r.push('完结');
if(/更新/.test(t))r.push('更新中');
return r;
}

/* ========= 网盘识别 ========= */
function disk(url){
if(url.includes('baidu'))return '百度';
if(url.includes('aliyun'))return '阿里';
if(url.includes('quark'))return '夸克';
return '其他';
}

let raw=[]; 
let current='全部';

/* ========= 搜索 ========= */
async function search(){
let kw=document.getElementById('kw').value.trim();
if(!kw)return;

let cache=getCache(kw);
if(cache){
raw=cache;
renderFilter();
render();
return;
}

for(let api of APIs){
try{
let r=await fetch(api+kw);
let j=await r.json();
let data=j.data?.merged_by_type||{};
let arr=[];
for(let k in data)arr=arr.concat(data[k]);
if(arr.length){
raw=arr;
setCache(kw,arr);
renderFilter();
render();
return;
}
}catch(e){}
}
alert('接口全挂了');
}

/* ========= 筛选 ========= */
function renderFilter(){
let types=[...new Set(raw.map(i=>disk(i.url)))];
let html='<button onclick="setFilter(\'全部\')" class="'+(current=='全部'?'active':'')+'">全部</button>';
types.forEach(t=>{
html+=`<button onclick="setFilter('${t}')" class="${current==t?'active':''}">${t}</button>`;
});
filter.innerHTML=html;
}
function setFilter(t){
current=t;
renderFilter();
render();
}

/* ========= 渲染 ========= */
function render(){
let arr=raw.filter(i=>current=='全部'||disk(i.url)==current);
let html='';
arr.forEach(i=>{
html+=`
<div class="card">
<div>${i.note||'无标题'}</div>
<div>${getTags(i.note||'').map(t=>`<span class="tag">${t}</span>`).join('')}</div>
<a href="${i.url}" target="_blank">打开</a>
</div>
`;
});
grid.innerHTML=html;
}

/* ========= 实时搜索 ========= */
let timer;
kw.oninput=()=>{
clearTimeout(timer);
timer=setTimeout(search,500);
};

/* ========= 音乐 ========= */
const list=[
'https://mpimg.cn/view.php/93e1ad1d1ff45f0cc3f3d6dedcd6ba3c.mp3'
];
let i=0;
music.onclick=()=>{
music.src=list[i];
music.play();
};
</script>

</body>
</html>
