以下是移除了头像和顶部滚动广告，并保留所有核心搜索与筛选功能的HTML代码。

```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>小钱全网盘搜 · 极速分类筛选版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #f5f7fb;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #5b6e8c;
            --border-color: #e9eef3;
            --accent-color: #1e3c72;
            --accent-hover: #0f2b4f;

            --glass-border: rgba(255, 255, 255, 0.2);
            --result-bg: rgba(30, 60, 114, 0.05);

            --filter-active: #1e3c72;
            --filter-inactive: #e2e8f0;

        }

        body.dark {

            --card-bg: #1e293b;
            --text-primary: #f1f5f9;

            --accent-color: #60a5fa;

            --tag-bg: #334155;
            --password-tag: #451a03;
            --filter-active: #60a5fa;
            --filter-inactive: #334155;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);

            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0 0 8px 0;
            background: linear-gradient(135deg, #4a6cf7, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub {
            color: var(--text-secondary);

        .search-box {

            justify-content: center;

        /* 筛选栏样式 */
        .filter-bar {
            margin: 20px 0 28px 0;
            background: var(--card-bg);
            border-radius: 60px;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .filter-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            padding-left: 8px;
        }

        .filter-chip {
            background: var(--filter-inactive);
            padding: 8px 20px;
            border-radius: 40px;

            box-shadow: 0 2px 8px rgba(0,0,0,0.15);

        .filter-chip:hover:not(.active) {

            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));

        .card {
            background: var(--card-bg);
            border-radius: 24px;

        .card-content {
            padding: 20px 24px;
        }

        .resource-title {
            font-weight: 700;
            font-size: 1.2rem;

        .meta-info {
            display: flex;
            flex-wrap: wrap;

        }

        .badge {
            background: var(--tag-bg);
            padding: 4px 12px;
            border-radius: 40px;
            color: var(--text-primary);
        }

        .password-badge {
            background: var(--password-tag);
            color: #b45309;
        }

        .note {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin: 12px 0;
            background: var(--result-bg);
            padding: 10px 12px;
            border-radius: 16px;
            word-break: break-word;
        }

        .link-btn {
            display: block;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 12px;
            transition: 0.2s;
        }

        .link-btn:hover {
            background: var(--accent-hover);
        }

        .footer-info {
            border-top: 1px solid var(--border-color);
            background: var(--card-bg);
            padding: 12px 20px;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
        }

        .empty-state, .error-state {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 60px 24px;
            text-align: center;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            font-size: 1rem;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1rem;
            color: var(--accent-color);
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);

            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 640px) {
            .container { padding: 16px; padding-top: 20px; }
            .search-header { padding: 24px 20px; }
            h1 { font-size: 1.6rem; }
            .search-input { min-width: 100%; font-size: 1rem; padding: 14px 20px; }
            .search-btn { min-width: 100%; padding: 14px 20px; }
            .results-grid { grid-template-columns: 1fr; gap: 16px; }
            .theme-toggle { top: 15px; right: 15px; width: 40px; height: 40px; font-size: 20px; }
            .filter-bar { border-radius: 30px; padding: 8px 12px; gap: 8px; }
            .filter-chip { padding: 6px 14px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="theme-toggle" id="themeToggle">🌙</div>

    <div class="container">
        <div class="search-header">
            <h1>小钱全网盘搜</h1>
            <div class="sub">🚀 代理加速 · 智能缓存 · 按盘分类筛选</div>
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="输入电影、剧集、短剧、书籍、音乐、软件、资料" autocomplete="off">
                <button id="searchBtn" class="search-btn">🔍 极速搜索</button>
            </div>
            <div id="statsArea" class="stats">✨ 代理加速已启用 · 支持网盘分类筛选</div>
        </div>

        <!-- 筛选栏：动态显示网盘类型 -->
        <div id="filterBar" class="filter-bar" style="display: none;">
            <span class="filter-label">📂 按网盘筛选：</span>
            <div id="filterChipsContainer" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
            <button id="clearFilterBtn" class="clear-filter">✖️ 清除筛选</button>
        </div>

        <div id="resultsContainer" class="results-grid">
            <div class="empty-state">
                🚀 代理加速版搜索站已就绪<br>
                ✅ 支持网盘分类筛选（百度/阿里/夸克/迅雷）<br>
                💡 试试搜索「死神来了」「短剧」「蜜语纪」等关键词
            </div>
        </div>
    </div>

    <script>
        (function() {
            const ORIGIN_API = 'https://so.252035.xyz/api/search?kw=';
            const PROXY_API = 'https://proxy.api.030101.xyz/';
            const USE_PROXY = true;

            function buildApiUrl(keyword) {
                const encodedKw = encodeURIComponent(keyword);
                if (USE_PROXY) {
                    return PROXY_API + ORIGIN_API + encodedKw;
                }
                return ORIGIN_API + encodedKw;
            }

            const cache = new Map();  
            let currentFilterType = 'all';      
            let currentRawResults = [];           
            let currentKeyword = '';

            // 增强网盘识别
            function getDiskType(url) {
                if (!url) return '🔗 网盘链接';
                const u = url.toLowerCase();
                if (u.includes('pan.baidu.com') || u.includes('baidu.com/s/')) return '📀 百度网盘';
                if (u.includes('aliyundrive.com') || u.includes('alipan.com')) return '☁️ 阿里云盘';
                if (u.includes('quark.cn') || u.includes('pan.quark.cn')) return '⚛️ 夸克网盘';
                if (u.includes('xunlei.com') || u.includes('pan.xunlei.com') || u.includes('xlsony.com')) return '⚡ 迅雷网盘';
                return '🔗 网盘链接';
            }

            function getPureDiskType(url) {
                const type = getDiskType(url);
                if (type === '📀 百度网盘') return '百度网盘';
                if (type === '☁️ 阿里云盘') return '阿里云盘';
                if (type === '⚛️ 夸克网盘') return '夸克网盘';
                if (type === '⚡ 迅雷网盘') return '迅雷网盘';
                return '其他';
            }

            function extractDiskTypesFromResults(results) {
                const typesSet = new Set();
                for (const item of results) {
                    const pure = getPureDiskType(item.url);
                    if (pure !== '其他') typesSet.add(pure);
                }
                const order = ['百度网盘', '阿里云盘', '夸克网盘', '迅雷网盘'];
                return order.filter(t => typesSet.has(t));
            }

            function renderFilterBar(typesArray) {
                const filterBar = document.getElementById('filterBar');
                const chipsContainer = document.getElementById('filterChipsContainer');
                if (!chipsContainer) return;
                if (!typesArray || typesArray.length === 0) {
                    filterBar.style.display = 'none';
                    return;
                }
                filterBar.style.display = 'flex';
                chipsContainer.innerHTML = '';
                
                const allChip = document.createElement('button');
                allChip.className = `filter-chip ${currentFilterType === 'all' ? 'active' : ''}`;
                allChip.textContent = `全部 (${currentRawResults.length})`;
                allChip.addEventListener('click', () => {
                    currentFilterType = 'all';
                    applyFilterAndRender();
                    updateFilterActiveUI();
                });
                chipsContainer.appendChild(allChip);
                
                typesArray.forEach(type => {
                    const count = currentRawResults.filter(item => getPureDiskType(item.url) === type).length;
                    const chip = document.createElement('button');
                    chip.className = `filter-chip ${currentFilterType === type ? 'active' : ''}`;
                    chip.textContent = `${type} (${count})`;
                    chip.addEventListener('click', () => {
                        currentFilterType = type;
                        applyFilterAndRender();
                        updateFilterActiveUI();
                    });
                    chipsContainer.appendChild(chip);
                });
            }

            function updateFilterActiveUI() {
                const chips = document.querySelectorAll('.filter-chip');
                chips.forEach(chip => {
                    const text = chip.textContent.split(' ')[0];
                    if (currentFilterType === 'all' && text === '全部') {
                        chip.classList.add('active');
                    } else if (currentFilterType !== 'all' && text === currentFilterType) {
                        chip.classList.add('active');
                    } else {
                        chip.classList.remove('active');
                    }
                });
            }

            function applyFilterAndRender() {
                if (!currentRawResults.length) {
                    renderEmptyOrError('empty', currentKeyword);
                    return;
                }
                let filtered = [...currentRawResults];
                if (currentFilterType !== 'all') {
                    filtered = filtered.filter(item => getPureDiskType(item.url) === currentFilterType);
                }
                if (filtered.length === 0) {
                    resultsContainer.innerHTML = `<div class="empty-state">😞 当前筛选“${currentFilterType}”下暂无资源<br>💡 试试其他网盘分类或清除筛选</div>`;
                    const totalOrigin = currentRawResults.length;
                    statsArea.innerText = `🔍 找到 ${totalOrigin} 条资源 · 当前筛选显示 0 条 (${currentFilterType})`;
                    return;
                }
                renderResultsDirect(filtered);
                const totalOrigin = currentRawResults.length;
                statsArea.innerHTML = `✅ 共 ${totalOrigin} 条资源 · 当前展示 ${filtered.length} 条 (筛选: ${currentFilterType === 'all' ? '全部网盘' : currentFilterType}) · 代理加速已缓存`;
            }

            function renderResultsDirect(resultsArray) {
                resultsContainer.innerHTML = '';
                for (let i = 0; i < resultsArray.length; i++) {
                    resultsContainer.insertAdjacentHTML('beforeend', renderCard(resultsArray[i]));
                }
                if (resultsArray.length > 30) {
                    const tip = document.createElement('div');
                    tip.className = 'stats';
                    tip.style.marginTop = '16px';
                    tip.style.textAlign = 'center';
                    tip.innerText = `✨ 共 ${resultsArray.length} 条结果，已全部展示`;
                    resultsContainer.appendChild(tip);
                }
            }

            function formatDate(dateStr) {
                if (!dateStr || dateStr.startsWith('0001-01-01')) return '时间未知';
                try {
                    const date = new Date(dateStr);
                    if (isNaN(date.getTime())) return dateStr.split('T')[0];
                    return `${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2,'0')}-${date.getDate().toString().padStart(2,'0')}`;
                } catch(e) {
                    return dateStr;
                }
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            function renderCard(item) {
                const title = item.note || item.title || '无标题资源';
                const url = item.url || '#';
                const password = item.password || '';
                const source = item.source || '网络共享';
                const datetime = item.datetime ? formatDate(item.datetime) : '时间未知';
                const noteDetail = item.note || '';
                const diskType = getDiskType(url);
                
                return `
                    <div class="card">
                        <div class="card-content">
                            <div class="resource-title">${escapeHtml(title)}</div>
                            <div class="meta-info">
                                <span class="badge">${diskType}</span>
                                <span class="badge">📅 ${datetime}</span>
                                <span class="badge">📡 ${escapeHtml(source)}</span>
                                ${password ? `<span class="badge password-badge">🔑 提取码: ${escapeHtml(password)}</span>` : ''}
                            </div>
                            ${noteDetail && noteDetail !== title ? `<div class="note">📄 ${escapeHtml(noteDetail.substring(0, 180))}${noteDetail.length > 180 ? '…' : ''}</div>` : ''}
                            <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" class="link-btn">📂 打开资源链接 →</a>
                        </div>
                        <div class="footer-info">
                            <span>✨ 来源: ${escapeHtml(source)}</span>
                            ${password ? `<span>🔐 密码: ${escapeHtml(password)}</span>` : '<span>🔓 无密码</span>'}
                        </div>
                    </div>
                `;
            }

            function showLoading() {
                resultsContainer.innerHTML = `<div class="loading"><div class="spinner"></div><div style="margin-top:12px;">🚀 代理加速请求中，智能缓存启用...</div></div>`;
                document.getElementById('filterBar').style.display = 'none';
            }

            function showError(msg) {
                resultsContainer.innerHTML = `<div class="error-state">⚠️ 请求失败: ${escapeHtml(msg)}<br><br>💡 提示: 代理服务器可能繁忙，请重试或检查网络</div>`;
                statsArea.innerText = `❌ 请求失败: ${msg}`;
                document.getElementById('filterBar').style.display = 'none';
                currentRawResults = [];
                currentFilterType = 'all';
            }

            function renderEmptyOrError(state, kw) {
                if (state === 'empty') {
                    resultsContainer.innerHTML = `<div class="empty-state">😞 未找到关于 “${escapeHtml(kw)}” 的资源<br>试试其他关键词 (例如: 蜜语纪、短剧、死神来了)</div>`;
                    statsArea.innerText = `🔍 没有找到与 “${kw}” 相关的结果`;
                }
                document.getElementById('filterBar').style.display = 'none';
            }

            async function fetchWithTimeout(url, timeout = 9000, retries = 1) {
                for (let i = 0; i <= retries; i++) {
                    try {
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), timeout);
                        const response = await fetch(url, { 
                            signal: controller.signal, 
                            headers: { 'Accept': 'application/json' }
                        });
                        clearTimeout(timeoutId);
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        return await response.json();
                    } catch (err) {
                        if (i === retries) throw err;
                        await new Promise(r => setTimeout(r, 500));
                    }
                }
            }

            async function searchResources(keyword) {
                if (!keyword || keyword.trim() === '') {
                    statsArea.innerText = '⚠️ 请输入搜索关键词';
                    resultsContainer.innerHTML = `<div class="empty-state">📌 请输入电影/剧集/资源名称</div>`;
                    document.getElementById('filterBar').style.display = 'none';
                    return;
                }
                const kw = keyword.trim();
                currentKeyword = kw;
                currentFilterType = 'all';
                
                if (cache.has(kw)) {
                    const cached = cache.get(kw);
                    currentRawResults = cached.allResults;
                    const types = extractDiskTypesFromResults(currentRawResults);
                    renderFilterBar(types);
                    applyFilterAndRender();
                    statsArea.innerHTML = `⚡ 缓存命中 · 共 ${cached.total} 条资源 · 支持网盘筛选`;
                    return;
                }
                
                statsArea.innerText = `🚀 代理加速请求中 · 关键词: ${kw}`;
                showLoading();
                
                try {
                    const apiUrl = buildApiUrl(kw);
                    const data = await fetchWithTimeout(apiUrl, 9000, 1);
                    
                    if (data.code !== 0 || !data.data) {
                        throw new Error(data.message || '接口返回数据异常');
                    }
                    
                    const mergedByType = data.data.merged_by_type || {};
                    let allResults = [];
                    for (let type in mergedByType) {
                        if (Array.isArray(mergedByType[type])) {
                            allResults = allResults.concat(mergedByType[type]);
                        }
                    }
                    
                    if (allResults.length === 0) {
                        renderEmptyOrError('empty', kw);
                        currentRawResults = [];
                        document.getElementById('filterBar').style.display = 'none';
                        return;
                    }
                    
                    const total = data.data.total || allResults.length;
                    currentRawResults = allResults;
                    
                    cache.set(kw, { allResults, total });
                    if (cache.size > 55) {
                        const firstKey = cache.keys().next().value;
                        cache.delete(firstKey);
                    }
                    
                    const diskTypes = extractDiskTypesFromResults(allResults);
                    renderFilterBar(diskTypes);
                    applyFilterAndRender();
                    statsArea.innerHTML = `✅ 找到 ${total} 条资源 · 支持 ${diskTypes.length} 种网盘筛选 (已缓存)`;
                    
                } catch (err) {
                    console.error('搜索出错:', err);
                    if (err.name === 'AbortError') {
                        showError('请求超时 (9秒)，代理服务器响应较慢，请重试');
                    } else {
                        showError(err.message || '网络错误或代理不可用');
                    }
                }
            }

            function preloadHotKeywords() {
                const hotWords = ['短剧', '电影', '死神来了', '电视剧', '4K', '蜜语纪'];
                if ('requestIdleCallback' in window) {
                    requestIdleCallback(() => {
                        hotWords.forEach(kw => {
                            if (!cache.has(kw)) {
                                fetchWithTimeout(buildApiUrl(kw), 10000, 0).catch(() => {});
                            }
                        });
                    });
                } else {
                    setTimeout(() => {
                        hotWords.forEach(kw => {
                            if (!cache.has(kw)) {
                                fetchWithTimeout(buildApiUrl(kw), 10000, 0).catch(() => {});
                            }
                        });
                    }, 2000);
                }
            }

            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const resultsContainer = document.getElementById('resultsContainer');
            const statsArea = document.getElementById('statsArea');
            const clearFilterBtn = document.getElementById('clearFilterBtn');
            
            searchBtn.addEventListener('click', () => searchResources(searchInput.value));
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchResources(searchInput.value);
            });
            
            if (clearFilterBtn) {
                clearFilterBtn.addEventListener('click', () => {
                    if (currentRawResults.length) {
                        currentFilterType = 'all';
                        applyFilterAndRender();
                        const types = extractDiskTypesFromResults(currentRawResults);
                        renderFilterBar(types);
                        updateFilterActiveUI();
                    }
                });
            }

            // 主题逻辑
            const themeToggle = document.getElementById('themeToggle');
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark');
                themeToggle.textContent = '☀️';
            }
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark');
                const isDark = document.body.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                themeToggle.textContent = isDark ? '☀️' : '🌙';
            });
            
            window.addEventListener('load', () => {
                preloadHotKeywords();
            });
        })();
    </script>
